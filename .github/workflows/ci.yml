name: CI

on:
  pull_request:
  push:
    branches: [master, main]

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - uses: android-actions/setup-android@v4
      - name: Configure Firebase build defaults
        run: cp app/google-services.example.json app/google-services.json
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew
      - name: Configure Android build defaults
        run: cp local.defaults.properties local.properties
      - name: Validate Android
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug assembleDebugAndroidTest

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend
        run: python -m pip install -e 'backend[dev]'
      - name: Lint backend
        run: python -m ruff check backend
      - name: Test backend
        run: python -m pytest backend
