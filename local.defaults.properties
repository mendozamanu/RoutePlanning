# Safe build-time defaults. Real values belong in the ignored local.properties file
# or in the CI secret store. Never commit usable credentials here.
# Keep this non-empty: the Secrets Gradle plugin emits invalid BuildConfig Java for an
# empty value. This is an intentionally unusable CI placeholder, not a credential.
GOOGLE_MAPS_API=CI_PLACEHOLDER_NOT_A_REAL_KEY
API_BASE_URL=http://10.0.2.2:8000
FIREBASE_SYNC_ENABLED=false
